<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flappy Shark 🦈</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(to bottom, #0a1f3a 0%, #000d1a 100%);
            font-family: Arial, sans-serif;
            overflow: hidden;
            margin: 0;
            padding: 0;
            touch-action: none;
        }

        #gameContainer {
            position: relative;
            width: 100vw;
            max-width: 400px;
            height: 100vh;
            max-height: 600px;
            background: linear-gradient(to bottom, #1a3a5f 0%, #0f2540 50%, #05121f 100%);
            border: 4px solid #0a1f3a;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.7);
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            touch-action: none;
        }

        #scoreBoard {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #ffeb3b;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
            z-index: 10;
        }

        #lives {
            position: absolute;
            top: 20px;
            right: 20px;
            color: #ff5252;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
            z-index: 10;
        }

        #startScreen, #gameOverScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.75);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 20;
        }

        #startScreen h1, #gameOverScreen h1 {
            font-size: 48px;
            margin-bottom: 20px;
            color: #ff5252;
            text-shadow: 3px 3px 6px rgba(0, 0, 0, 0.9);
        }

        #startScreen p, #gameOverScreen p {
            font-size: 20px;
            margin-bottom: 30px;
            text-align: center;
            padding: 0 20px;
        }

        button {
            padding: 15px 40px;
            font-size: 20px;
            background: #ff5252;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.4);
        }

        button:hover {
            background: #d32f2f;
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.5);
        }

        #finalScore {
            font-size: 28px;
            margin: 10px 0;
            color: #ffeb3b;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="400" height="600"></canvas>
        <div id="scoreBoard">Score: 0</div>
        <div id="lives">❤️❤️❤️ 3</div>

        <div id="startScreen">
            <h1>Flappy Shark 🦈</h1>
            <p>Tap or press space to swim up!<br>Eat scuba divers and avoid corals!</p>
            <button onclick="startGame()">Start</button>
        </div>

        <div id="gameOverScreen" style="display: none;">
            <h1>Game Over!</h1>
            <div id="finalScore"></div>
            <button onclick="restartGame()">Play Again</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Game variables
        let gameStarted = false;
        let gameOver = false;
        let score = 0;
        let lives = 3;
        let frame = 0;

        // Shark (player)
        const shark = {
            x: 80,
            y: 300,
            width: 60,     // slightly bigger than original fish
            height: 35,
            velocity: 0,
            gravity: 0.42,
            jump: -9.5,
            rotation: 0
        };

        // Corals (obstacles)
        let corals = [];
        const coralGap = 180;
        const coralWidth = 60;
        const coralSpeed = 2.2;

        // Scuba divers (collectibles)
        let divers = [];

        // Bubbles for underwater feel
        let bubbles = [];

        for (let i = 0; i < 25; i++) {
            bubbles.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                radius: Math.random() * 4 + 1,
                speed: Math.random() * 0.6 + 0.3
            });
        }

        function drawShark() {
            ctx.save();
            ctx.translate(shark.x + shark.width / 2, shark.y + shark.height / 2);
            ctx.rotate(shark.rotation);

            // Shark body (gray with white belly)
            ctx.fillStyle = '#78909c';
            ctx.beginPath();
            ctx.ellipse(0, 0, shark.width / 2, shark.height / 2, 0, 0, Math.PI * 2);
            ctx.fill();

            // White underbelly
            ctx.fillStyle = '#eceff1';
            ctx.beginPath();
            ctx.ellipse(0, shark.height / 6, shark.width / 2.2, shark.height / 3, 0, 0, Math.PI * 2);
            ctx.fill();

            // Dorsal fin
            ctx.fillStyle = '#455a64';
            ctx.beginPath();
            ctx.moveTo(0, -shark.height / 2);
            ctx.lineTo(20, -shark.height / 1.5);
            ctx.lineTo(-10, -shark.height / 3);
            ctx.closePath();
            ctx.fill();

            // Tail
            ctx.fillStyle = '#455a64';
            ctx.beginPath();
            ctx.moveTo(-shark.width / 2, 0);
            ctx.lineTo(-shark.width / 2 - 25, -18);
            ctx.lineTo(-shark.width / 2 - 25, 18);
            ctx.closePath();
            ctx.fill();

            // Eye
            ctx.fillStyle = 'white';
            ctx.beginPath();
            ctx.arc(shark.width / 3.5, -shark.height / 5, 6, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = 'black';
            ctx.beginPath();
            ctx.arc(shark.width / 3.5, -shark.height / 5, 3, 0, Math.PI * 2);
            ctx.fill();

            // Teeth (simple)
            ctx.fillStyle = '#fafafa';
            ctx.beginPath();
            ctx.moveTo(shark.width / 2 - 5, 5);
            ctx.lineTo(shark.width / 2 + 5, 12);
            ctx.lineTo(shark.width / 2 + 5, -2);
            ctx.closePath();
            ctx.fill();

            ctx.restore();
        }

        function drawCoral(coral) {
            const sway = Math.sin(frame * 0.05 + coral.offset) * 15;

            // Top coral
            ctx.save();
            ctx.translate(coral.x + coralWidth / 2, 0);

            for (let i = 0; i < 8; i++) {
                const height = coral.topHeight / 8;
                const swayAmount = sway * (i / 8);

                ctx.fillStyle = i % 2 === 0 ? '#e74c3c' : '#c0392b';
                ctx.fillRect(-coralWidth / 2 + swayAmount, i * height, coralWidth, height);
            }
            ctx.restore();

            // Bottom coral
            ctx.save();
            ctx.translate(coral.x + coralWidth / 2, coral.topHeight + coralGap);

            for (let i = 0; i < 8; i++) {
                const height = coral.bottomHeight / 8;
                const swayAmount = sway * ((8 - i) / 8);

                ctx.fillStyle = i % 2 === 0 ? '#9b59b6' : '#8e44ad';
                ctx.fillRect(-coralWidth / 2 + swayAmount, i * height, coralWidth, height);
            }
            ctx.restore();
        }

        function drawDiver(diver) {
            // Simple scuba diver (stick figure with tank & flippers)
            const dx = diver.x;
            const dy = diver.y;

            // Oxygen tank
            ctx.fillStyle = '#ff9800';
            ctx.fillRect(dx - 8, dy - 15, 16, 25);

            // Head
            ctx.fillStyle = '#ffe0b2';
            ctx.beginPath();
            ctx.arc(dx, dy - 25, 10, 0, Math.PI * 2);
            ctx.fill();

            // Mask
            ctx.fillStyle = '#0288d1';
            ctx.fillRect(dx - 12, dy - 28, 24, 12);

            // Body
            ctx.fillStyle = '#0288d1';
            ctx.fillRect(dx - 12, dy - 15, 24, 30);

            // Flippers
            ctx.fillStyle = '#0288d1';
            ctx.beginPath();
            ctx.moveTo(dx - 10, dy + 15);
            ctx.lineTo(dx - 25, dy + 25);
            ctx.lineTo(dx - 5, dy + 20);
            ctx.closePath();
            ctx.fill();

            ctx.beginPath();
            ctx.moveTo(dx + 10, dy + 15);
            ctx.lineTo(dx + 25, dy + 25);
            ctx.lineTo(dx + 5, dy + 20);
            ctx.closePath();
            ctx.fill();

            // Bubbles from diver (tiny)
            ctx.fillStyle = 'rgba(200, 240, 255, 0.7)';
            ctx.beginPath();
            ctx.arc(dx + 12, dy - 5, 3, 0, Math.PI * 2);
            ctx.fill();
        }

        function drawBubbles() {
            bubbles.forEach(bubble => {
                ctx.fillStyle = 'rgba(200, 240, 255, 0.4)';
                ctx.beginPath();
                ctx.arc(bubble.x, bubble.y, bubble.radius, 0, Math.PI * 2);
                ctx.fill();

                bubble.y -= bubble.speed;
                if (bubble.y + bubble.radius < 0) {
                    bubble.y = canvas.height + bubble.radius;
                    bubble.x = Math.random() * canvas.width;
                }
            });
        }

        function createCoral() {
            const minHeight = 100;
            const maxHeight = 300;
            const topHeight = Math.random() * (maxHeight - minHeight) + minHeight;
            const bottomHeight = canvas.height - topHeight - coralGap;

            corals.push({
                x: canvas.width,
                topHeight: topHeight,
                bottomHeight: bottomHeight,
                offset: Math.random() * Math.PI * 2,
                passed: false
            });
        }

        function createDiver() {
            if (corals.length > 0) {
                const lastCoral = corals[corals.length - 1];
                const diverY = lastCoral.topHeight + coralGap / 2 + (Math.random() * 40 - 20); // slight random vertical offset

                divers.push({
                    x: lastCoral.x + coralWidth / 2,
                    y: diverY,
                    collected: false
                });
            }
        }

        function checkCollision() {
            // Coral collision
            for (let coral of corals) {
                if (shark.x + shark.width > coral.x && shark.x < coral.x + coralWidth) {
                    const sway = Math.sin(frame * 0.05 + coral.offset) * 15;

                    if (shark.y < coral.topHeight || shark.y + shark.height > coral.topHeight + coralGap) {
                        loseLife();
                        return;
                    }
                }

                // Score when passing coral
                if (!coral.passed && shark.x > coral.x + coralWidth) {
                    coral.passed = true;
                    score += 10;
                    updateScore();
                }
            }

            // Diver (food) collection
            for (let diver of divers) {
                if (!diver.collected) {
                    const distance = Math.sqrt(
                        Math.pow(shark.x + shark.width / 2 - diver.x, 2) +
                        Math.pow(shark.y + shark.height / 2 - diver.y, 2)
                    );

                    if (distance < 30) {   // slightly larger hitbox
                        diver.collected = true;
                        score += 20;       // divers worth more than old food
                        updateScore();
                    }
                }
            }

            // Boundaries
            if (shark.y + shark.height > canvas.height || shark.y < 0) {
                loseLife();
            }
        }

        function loseLife() {
            lives--;
            updateLives();

            if (lives <= 0) {
                endGame();
            } else {
                shark.y = 300;
                shark.velocity = 0;
                corals = corals.filter(c => c.x < shark.x - 100);
            }
        }

        function updateScore() {
            document.getElementById('scoreBoard').textContent = 'Score: ' + score;
        }

        function updateLives() {
            const hearts = '❤️'.repeat(lives);
            document.getElementById('lives').textContent = hearts + ' ' + lives;
        }

        function gameLoop() {
            if (!gameStarted || gameOver) return;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            drawBubbles();

            corals.forEach(coral => {
                coral.x -= coralSpeed;
                drawCoral(coral);
            });

            corals = corals.filter(c => c.x + coralWidth > 0);

            divers.forEach(diver => {
                diver.x -= coralSpeed;
                if (!diver.collected) {
                    drawDiver(diver);
                }
            });

            divers = divers.filter(d => d.x > 0);

            if (frame % 120 === 0) {
                createCoral();
                createDiver();
            }

            shark.velocity += shark.gravity;
            shark.y += shark.velocity;
            shark.rotation = Math.min(Math.max(shark.velocity * 0.06, -0.6), 0.6);

            drawShark();
            checkCollision();

            frame++;
            requestAnimationFrame(gameLoop);
        }

        function startGame() {
            document.getElementById('startScreen').style.display = 'none';
            gameStarted = true;
            gameOver = false;
            score = 0;
            lives = 3;
            frame = 0;
            corals = [];
            divers = [];
            shark.y = 300;
            shark.velocity = 0;
            updateScore();
            updateLives();
            gameLoop();
        }

        function endGame() {
            gameOver = true;
            document.getElementById('finalScore').textContent = 'Final Score: ' + score;
            document.getElementById('gameOverScreen').style.display = 'flex';
        }

        function restartGame() {
            document.getElementById('gameOverScreen').style.display = 'none';
            startGame();
        }

        function jump() {
            if (gameStarted && !gameOver) {
                shark.velocity = shark.jump;
            }
        }

        canvas.addEventListener('click', jump);
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            jump();
        });

        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                jump();
            }
        });
    </script>
</body>
</html>
